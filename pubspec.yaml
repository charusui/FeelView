name: feelview
description: "FeelView — The private, elder-first intergenerational family network."
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.3
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.2

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Voice & TTS
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  video_player: ^2.9.1
  just_audio: ^0.9.40

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4

  # Typography
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.12
  mockito: ^5.4.4
  fake_cloud_firestore: ^3.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/icons/
