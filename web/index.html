<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="feelview">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>feelview</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <style>
    /* Completely hide Firebase SDK Auth Emulator warning banner */
    .firebase-emulator-warning,
    div[style*="rgb(244, 67, 54)"],
    div[style*="background-color: rgb(244, 67, 54)"],
    div[style*="background: rgb(244, 67, 54)"] {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      height: 0 !important;
      width: 0 !important;
      overflow: hidden !important;
      pointer-events: none !important;
    }
  </style>
  <script>
    // Permanently zap and remove Firebase Emulator warning banner if injected by JS SDK
    const observer = new MutationObserver((mutations) => {
      document.querySelectorAll('div, p, span').forEach((el) => {
        if (el.textContent && el.textContent.includes('Running in emulator mode')) {
          el.style.display = 'none';
          el.remove();
        }
      });
    });
    observer.observe(document.documentElement, { childList: true, subtree: true });
  </script>
  <script type="module">
    import * as tts from 'https://cdn.jsdelivr.net/npm/@mintplex-labs/piper-tts-web@1.0.4/+esm';

    // 1. Create a dedicated audio player and unlock it on user gesture to avoid browser NotAllowedError
    window._piperAudioPlayer = new Audio();
    window._piperAudioUnlocked = false;

    const unlockAudio = () => {
      if (!window._piperAudioUnlocked) {
        window._piperAudioPlayer.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
        window._piperAudioPlayer.play().then(() => {
          window._piperAudioPlayer.pause();
          window._piperAudioUnlocked = true;
          console.log("Piper audio player unlocked via user gesture!");
        }).catch(() => {});
      }
    };
    window.addEventListener('click', unlockAudio, { once: true });
    window.addEventListener('touchstart', unlockAudio, { once: true });
    window.addEventListener('keydown', unlockAudio, { once: true });

    // 2. Pre-download the Amy model immediately in the background so it is cached in OPFS
    setTimeout(() => {
      console.log("Starting background pre-download of Piper voice en_US-amy-medium...");
      tts.download('en_US-amy-medium', (progress) => {
        if (progress.total) {
          console.log(`Piper model download: ${Math.round((progress.loaded / progress.total) * 100)}%`);
        }
      }).then(() => {
        console.log("Piper voice en_US-amy-medium downloaded and cached ready for use!");
      }).catch(e => console.warn("Background pre-download note:", e));
    }, 1500);

    // 3. Expose synthesis function to Dart
    window.piperSpeakWeb = async function(text) {
      try {
        console.log("Synthesizing Piper Amy voice in browser for:", text);
        const wav = await tts.predict({
          text: text,
          voiceId: 'en_US-amy-medium',
        });
        const url = URL.createObjectURL(wav);
        window._piperAudioPlayer.src = url;
        await window._piperAudioPlayer.play();
        return true;
      } catch (err) {
        console.error("Piper web synthesis failed:", err);
        return false;
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
